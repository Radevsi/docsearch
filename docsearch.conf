# docsearch.conf — defaults; override per-call with CLI flags or the web UI
# Folders to search (one per line, ~ allowed)
folder=~/Documents
folder=~/Downloads
folder=~/Desktop

# File extensions to include
type=docx
type=pdf
type=doc
type=rtf
type=pages
type=txt
type=md

# Default match mode: all | exact | any
mode=all

# Snippet context (characters around each match)
context=80
